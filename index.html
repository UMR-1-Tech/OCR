<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-OCR Flow | U-Tech Project®</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #007bff;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .tagline { font-size: 0.9rem; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 50px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        #drop-zone:hover { border-color: var(--primary); background: rgba(0, 123, 255, 0.1); }

        .table-wrapper { border-radius: 12px; background: rgba(0, 0, 0, 0.2); max-height: 350px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        th { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; sticky; top: 0; background: #1e293b; }

        .img-preview { width: 60px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

        .btn-export {
            width: 100%;
            margin-top: 25px;
            padding: 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #15803d;
            transition: 0.1s;
        }

        .btn-export:active { transform: translateY(2px); box-shadow: 0 2px 0 #15803d; }
        
        #file-input { display: none; }
        .upload-link { color: var(--primary); font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">
        <h1>U-OCR Flow</h1>
        <div class="tagline">U-Tech Project®</div>
    </div>

    <div class="container">
        <input type="file" id="file-input" multiple accept="image/*">
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>Drag Images, <strong>Paste (Ctrl+V)</strong>, or <span class="upload-link">Browse Device</span></p>
            <span style="font-size: 0.8rem; color: #64748b;">Optimized for clean address extraction</span>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">Visual</th>
                        <th>Cleaned Address Data</th>
                        <th style="width: 120px;">Status</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <button class="btn-export" onclick="downloadExcel()">DOWNLOAD MASTER CLEAN EXCEL</button>
    </div>

    <script>
        const tableBody = document.getElementById('table-body');
        const fileInput = document.getElementById('file-input');
        let masterList = [];

        // Input Handlers
        fileInput.addEventListener('change', e => { [...e.target.files].forEach(processImage); });
        window.addEventListener('paste', e => {
            const items = e.clipboardData.items;
            for (let item of items) if (item.type.indexOf("image") !== -1) processImage(item.getAsFile());
        });

        async function processImage(file) {
            const row = document.createElement('tr');
            const imgUrl = URL.createObjectURL(file);
            row.innerHTML = `
                <td><img src="${imgUrl}" class="img-preview"></td>
                <td class="ocr-text" style="white-space: pre-wrap; font-size: 0.9rem; color: #94a3b8;">Processing...</td>
                <td><span style="font-size: 0.8rem; background: #334155; padding: 4px 8px; border-radius: 4px;">Scanning</span></td>
            `;
            tableBody.prepend(row);

            try {
                const result = await Tesseract.recognize(file, 'eng');
                
                // CLEANING LOGIC: Removes [m], [mi], |, and garbage tails
                const lines = result.data.text.split('\n')
                    .map(line => line
                        .replace(/\[.*?\]/g, '') // Remove brackets [m]
                        .replace(/\|.*$/g, '')    // Remove tails starting with |
                        .replace(/[^\w\s\.,-]/g, '') // Remove weird special characters
                        .replace(/\s{2,}/g, ' ')  // Fix double spaces
                        .trim()
                    )
                    .filter(line => line.length > 15); // Filter fragments

                row.querySelector('.ocr-text').innerText = lines.join('\n');
                row.querySelector('.ocr-text').style.color = "#f8fafc";
                
                lines.forEach(line => {
                    masterList.push({ "Cleaned Address": line });
                });
                
                row.querySelector('span').innerText = "✅ Done";
                row.querySelector('span').style.background = "#166534";
            } catch (err) {
                row.querySelector('span').innerText = "❌ Error";
                row.querySelector('span').style.background = "#991b1b";
            }
        }

        function downloadExcel() {
            if (masterList.length === 0) return alert("No data found!");
            const worksheet = XLSX.utils.json_to_sheet(masterList);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "U-Tech Data");
            worksheet['!cols'] = [{ wch: 80 }]; // Auto-width for the clean column
            XLSX.writeFile(workbook, "U-Tech_Clean_List.xlsx");
        }
    </script>
</body>
</html>
