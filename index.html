<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-OCR Flow | U-Tech Project®</title>
    <!-- Core Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #007bff;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .tagline { font-size: 0.9rem; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        #drop-zone:hover { border-color: var(--primary); background: rgba(0, 123, 255, 0.1); }

        .table-wrapper { overflow-x: auto; border-radius: 12px; background: rgba(0, 0, 0, 0.2); max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        th { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; position: sticky; top: 0; background: #1e293b; }

        .img-preview { width: 80px; height: 50px; object-fit: cover; border-radius: 4px; }

        .btn-export {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #15803d;
        }

        .btn-export:active { transform: translateY(2px); box-shadow: 0 2px 0 #15803d; }
        
        #file-input { display: none; }
        .upload-link { color: var(--primary); text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>U-OCR Flow</h1>
        <div class="tagline">U-Tech Project®</div>
    </div>

    <div class="container">
        <!-- Clickable Drop Zone with File Input -->
        <input type="file" id="file-input" multiple accept="image/*">
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>Drag Images, <strong>Paste (Ctrl+V)</strong>, or <span class="upload-link">Select from Device</span></p>
            <span style="font-size: 0.8rem; color: #64748b;">Supports JPEG, PNG, WEBP, BMP</span>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Preview</th>
                        <th>Extracted Rows</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <button class="btn-export" onclick="downloadExcel()">Generate Master Excel File</button>
    </div>

    <script>
        const tableBody = document.getElementById('table-body');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        let accumulatedData = [];

        // --- INPUT HANDLERS ---

        // 1. File Selection from Device
        fileInput.addEventListener('change', e => {
            [...e.target.files].forEach(processImage);
        });

        // 2. Paste (Ctrl+V)
        window.addEventListener('paste', e => {
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.indexOf("image") !== -1) processImage(item.getAsFile());
            }
        });

        // 3. Drag & Drop
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            [...e.dataTransfer.files].forEach(processImage);
        });

        // --- PROCESSING LOGIC ---

        async function processImage(file) {
            const row = document.createElement('tr');
            const imgUrl = URL.createObjectURL(file);
            row.innerHTML = `
                <td><img src="${imgUrl}" class="img-preview"></td>
                <td class="ocr-text" style="white-space: pre-wrap; color: #94a3b8;">Analyzing Table Rows...</td>
                <td><span class="status">Working...</span></td>
            `;
            tableBody.prepend(row);

            try {
                // Perform OCR
                const result = await Tesseract.recognize(file, 'eng');
                
                // FIXED: Split text by new lines and remove empty/garbage entries
                const rawLines = result.data.text.split('\n');
                const validLines = rawLines.filter(line => line.trim().length > 10); // Filters out small fragments

                row.querySelector('.ocr-text').innerText = validLines.join('\n');
                row.querySelector('.ocr-text').style.color = "#f8fafc";
                
                // Add each individual line as a separate row for Excel
                validLines.forEach(line => {
                    accumulatedData.push({
                        "Full Address Data": line.trim(),
                        "Time Captured": new Date().toLocaleString(),
                        "Source File": file.name || "Pasted Snippet"
                    });
                });
                
                row.querySelector('.status').innerText = `✅ Found ${validLines.length} Rows`;
            } catch (err) {
                row.querySelector('.status').innerText = "❌ OCR Failed";
                console.error(err);
            }
        }

        function downloadExcel() {
            if (accumulatedData.length === 0) return alert("Please add some images first!");
            
            const worksheet = XLSX.utils.json_to_sheet(accumulatedData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Scanned Data");
            
            // Auto-size columns
            worksheet['!cols'] = [{ wch: 70 }, { wch: 25 }, { wch: 20 }];
            
            XLSX.writeFile(workbook, "U-Tech_Master_Data.xlsx");
        }
    </script>
</body>
</html>
